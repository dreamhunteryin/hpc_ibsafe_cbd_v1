data:
  dataset_root: /home2020/home/icube/camma_files/camma_data/bsafe_dataset/bsafe
  dataset_name: Bsafe
  annotation_file: null
  train_split: train
  val_split: val
  test_split: test
  target_type: all

model:
  model_id_or_path: PekingU/rtdetr_r50vd
  freeze_mode: full

training:
  batch_size: 2
  num_workers: 4
  detector_lr: 1.0e-4
  backbone_lr: 1.0e-5
  weight_decay: 1.0e-4
  num_epochs: 30
  early_stopping_patience: 5
  best_metric: ap50
  mixed_precision: bf16
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 0
  gradient_accumulation_steps: 1
  augment: true

output:
  output_dir: outputs/bsafe_cbd_rtdetr

hardware:
  device: cuda
  dataloader_pin_memory: true
